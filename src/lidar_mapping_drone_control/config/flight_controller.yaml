flight_controller:
  ros__parameters:
    controller_mode: "manual_keyboard"
    control_rate_hz: 50.0
    mass_kg: 1.62
    gravity_mps2: 9.80665

    tf_topic: "/tf"
    tracked_child_frame: "x3_lidar"
    motor_command_topic: "/X3/gazebo/command/motor_speed"
    manual_reference_delta_topic: "/flight_controller/manual_reference_delta"
    emergency_stop_topic: "/flight_controller/emergency_stop"
    emergency_stop: false

    target_altitude_m: 1.0
    target_x_m: 0.0
    target_y_m: 0.0
    target_yaw_deg: 0.0
    target_roll_deg: 0.0
    target_pitch_deg: 0.0

    xy_position_controller:
      kp: 0.80
      kd: 0.40
      max_accel_mps2: 1.0
      max_tilt_deg: 8.0

    pitch_roll_controller:
      roll:
        kp: 0.12
        ki: 0.0
        kd: 0.035
        integral_limit: 0.0
      pitch:
        kp: 0.12
        ki: 0.0
        kd: 0.035
        integral_limit: 0.0
      torque_limit_nm: 0.18

    yaw_controller:
      kp: 0.05
      ki: 0.0
      kd: 0.015
      integral_limit: 0.0
      torque_limit_nm: 0.08

    altitude_controller:
      kp: 1.10
      ki: 0.0
      kd: 0.55
      integral_limit: 1.0
      min_thrust_n: 0.0
      max_thrust_n: 35.0

    motor_mixer:
      motor_constant_n_per_radps2: 0.00000854858
      moment_constant_m: 0.016
      rotor_x_m: [0.13, -0.13, 0.13, -0.13]
      rotor_y_m: [-0.22, 0.20, 0.22, -0.20]
      rotor_spin_sign: [1.0, 1.0, -1.0, -1.0]
      min_motor_speed_rad_s: 0.0
      max_motor_speed_rad_s: 800.0

    safety:
      max_altitude_m: 3.0
      max_tilt_deg: 35.0
      state_timeout_s: 0.5

    manual_keyboard:
      altitude_step_m: 0.10
      attitude_step_deg: 1.0
      yaw_step_deg: 5.0

keyboard_control:
  ros__parameters:
    manual_reference_delta_topic: "/flight_controller/manual_reference_delta"
    emergency_stop_topic: "/flight_controller/emergency_stop"
    altitude_step_m: 0.10
    attitude_step_deg: 1.0
    yaw_step_deg: 5.0
